# fly.toml — https://fly.io/docs/reference/configuration/
app = "easyreceiptbackend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  EASYRECEIPT_HASH_STORE_PATH = "/data/hash_entries.jsonl"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

[[mounts]]
  source = "data"
  destination = "/data"
