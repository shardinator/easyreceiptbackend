# fly.toml — https://fly.io/docs/reference/configuration/
#
# This API stores rows in a JSONL file on a Fly Volume (/data). Each Machine has
# its own volume — they are not shared. If more than one Machine runs this app,
# the proxy load-balances across them: GET /api/entries and DELETE /api/entries/{id}
# can hit different disks, so deletes look broken (404) or rows "reappear" after refresh.
#
# Keep exactly one Machine for the default `app` group, e.g.:
#   fly scale count 1
# On fresh deploys prefer a single Machine:
#   fly deploy --ha=false
#
app = "easyreceiptbackend"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  EASYRECEIPT_HASH_STORE_PATH = "/data/hash_entries.jsonl"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

[[mounts]]
  source = "data"
  destination = "/data"
